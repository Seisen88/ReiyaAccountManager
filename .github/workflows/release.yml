name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1)'
        required: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      - name: Patch tauri.conf.json version
        shell: bash
        run: |
          python -c "
          import json, sys
          with open('src-tauri/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          conf['version'] = sys.argv[1]
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          " "$VERSION"

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          python -c "
          import sys
          v = sys.argv[1]
          with open('src-tauri/Cargo.toml', 'r') as f:
              lines = f.readlines()
          done = False
          for i, line in enumerate(lines):
              if not done and line.startswith('version = '):
                  lines[i] = f'version = \"{v}\"\n'
                  done = True
          with open('src-tauri/Cargo.toml', 'w') as f:
              f.writelines(lines)
          " "$VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Find NSIS installer
        id: installer
        shell: bash
        run: |
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          echo "path=$EXE" >> $GITHUB_OUTPUT
          echo "name=$(basename "$EXE")" >> $GITHUB_OUTPUT

      - name: Publish release to Key-System (public repo)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.KEY_SYSTEM_PAT }}
        run: |
          EXE="${{ steps.installer.outputs.path }}"
          DEST="ReiyaAccountManager-$VERSION-setup.exe"
          cp "$EXE" "$DEST"

          gh release create "v$VERSION" "$DEST" \
            --repo Seisen88/Key-System \
            --title "Reiya Account Manager v$VERSION" \
            --notes "## v$VERSION

Download and run the installer to update." \
            --latest
